[Proxies]
# Proxies for required interfaces
CameraRGBDSimple = "camerargbdsimple:tcp -h localhost -p 12001"
Lidar3D = "lidar3d:tcp -h localhost -p 11995"  # Filter

# --- Common Agent Data ---
[Agent]
id = 6 # Change id
name = "robot_concept"

# --- Single Instance Configuration ---
# Use this if you only have one graph.
configFile = "shadow.json"   
domain = 0
tree = false
graph = true
2d = false
3d = false

# --- Multiple Instance Template ---
# If you define multiple instances, the single instance config above will be ignored.
# [Agent.instance_name]
# configFile = "shadow.json"
# domain = 1
# tree = true
# graph = true
# 2d = true
# 3d = true

[Period]
Compute = 100
Emergency = 500

[Yolo]
model_path  = "yolo26l-seg.onnx"
conf_thresh = 0.25
iou_thresh  = 0.45
use_gpu     = true
use_trt     = true
accepted_labels = [
	"backpack", "handbag", "suitcase",
	"bottle", "wine glass", "cup", "fork", "knife", "spoon", "bowl",
	"banana", "apple", "sandwich", "orange", "broccoli", "carrot",
	"hot dog", "pizza", "donut", "cake",
	"chair", "couch", "potted plant", "bed", "dining table", "toilet", "tv",
	"laptop", "mouse", "remote", "keyboard", "cell phone",
	"microwave", "oven", "toaster", "sink", "refrigerator",
	"book", "clock", "vase", "scissors", "teddy bear", "hair drier", "toothbrush"
]

# Hungarian association and mask erosion parameters
mask_erode_kernel = 2
track_association_max_distance_m = 0.7
track_max_missed_frames = 10

[Camera]
# DSR upload frame rates. 0 = every captured frame (no throttle).
dsr_rgb_fps   = 10   # RGB: every frame by default
dsr_depth_fps = 10   # Depth: 5 Hz (large blob, less time-critical)

[Lidar]
# DSR upload rate for lidar point cloud. 0 = every captured scan (no throttle).
dsr_lidar_fps = 0

[Component.Debug]
Verbose = false

[Ice]
Warn.Connections = "0"
Trace.Network = "0"
Trace.Protocol = "0"
MessageSizeMax = "20004800"
